<a href="{{ url_for('index') }}" class="hud-brand hud-brand-link" id="hud-brand-link"
   data-home="{{ url_for('index') }}" title="Chkobba home">Chkobba</a>
<script>
(function(){
    var link = document.getElementById('hud-brand-link');
    if (!link) return;

    link.addEventListener('click', function(e){
        if (!document.body.classList.contains('session-game')) return;
        if (!document.getElementById('page-state')) return;
        e.preventDefault();
        if (typeof window.openLeaveGameModal === 'function') {
            window.openLeaveGameModal();
        } else {
            window.location.href = link.dataset.home || link.getAttribute('href') || '/';
        }
    });
})();
</script>
